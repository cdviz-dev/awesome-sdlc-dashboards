{{ define "main" }}
<div x-data="catalog()" x-init="init()">

  <!-- Filters -->
  <div class="filters-bar">
    <div class="filters-inner">
      <div class="search-wrap">
        <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input
          type="search"
          class="search-input"
          placeholder="Search titles, descriptions, tags…"
          x-model.debounce.200ms="search"
          aria-label="Search"
        >
      </div>

      <div class="filter-controls">
        <select x-model="filterKind" aria-label="Filter by kind">
          <option value="">All kinds</option>
          <option value="dashboard">Dashboard</option>
          <option value="panel">Panel</option>
        </select>

        <select x-model="filterPanelType" aria-label="Filter by panel type" x-show="filterKind !== 'dashboard'">
          <option value="">All panel types</option>
          <template x-for="pt in panelTypes" :key="pt">
            <option :value="pt" x-text="pt"></option>
          </template>
        </select>

        <select x-model="filterTopic" aria-label="Filter by topic">
          <option value="">All topics</option>
          <template x-for="t in topics" :key="t">
            <option :value="t" x-text="t"></option>
          </template>
        </select>

        <select x-model="filterSource" aria-label="Filter by source">
          <option value="">All sources</option>
          <template x-for="src in sources" :key="src">
            <option :value="src" x-text="src"></option>
          </template>
        </select>

        <button
          class="clear-btn"
          x-show="hasActiveFilters"
          @click="clearFilters"
          aria-label="Clear filters"
        >Clear filters</button>
      </div>
    </div>

    <!-- Active tag filter chips -->
    <div class="filter-tag-chip" x-show="filterTags.length" x-cloak>
      <span>Tags:</span>
      <template x-for="tag in filterTags" :key="tag">
        <span class="chip">
          <span x-text="tag"></span>
          <button @click="toggleTag(tag)" aria-label="Remove tag filter">✕</button>
        </span>
      </template>
    </div>
  </div>

  <!-- Results bar -->
  <div class="results-bar">
    <span x-show="!loading" x-text="`${filtered.length} of ${entries.length} entries`"></span>
    <span x-show="loading">Loading…</span>
  </div>

  <!-- Card grid -->
  <main class="card-grid" x-show="!loading">
    <template x-for="entry in filtered" :key="entry.slug">
      <article class="card" :class="`kind-${entry.kind}`">

        <!-- Thumbnail -->
        <div class="card-image-wrap" @click="openModal(entry)">
          <template x-if="entry.thumbnail">
            <img
              :src="entry.thumbnail"
              :alt="entry.title"
              loading="lazy"
              class="card-image"
            >
          </template>
          <template x-if="!entry.thumbnail">
            <div class="card-image-placeholder">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="48" height="48"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>
            </div>
          </template>
        </div>

        <!-- Body -->
        <div class="card-body">
          <div class="card-badges">
            <span class="badge" :class="`badge-${entry.kind}`" x-text="entry.kind"></span>
            <span class="badge badge-panel-type" x-show="entry.panel_type" x-text="entry.panel_type"></span>
            <span class="badge badge-source" x-show="entry.source" x-text="entry.source"></span>
          </div>

          <h2 class="card-title">
            <a :href="`catalog/${entry.slug}/`" x-text="entry.title"></a>
          </h2>

          <p class="card-description" x-text="firstLine(entry.description)"></p>

          <!-- Parent dashboard link for panels -->
          <p class="card-parent" x-show="entry.related_dashboard">
            Part of:
            <a href="#"
               @click.prevent="filterByDashboard(entry.related_dashboard)"
               x-text="entry.related_dashboard"
            ></a>
          </p>

          <div class="card-footer">
            <div class="card-tags">
              <template x-for="tag in entry.tags" :key="tag">
                <button
                  class="tag"
                  :class="{ 'tag-active': filterTags.includes(tag), 'tag-topic': tag.startsWith('topic:') }"
                  @click="toggleTag(tag)"
                  x-text="tag"
                ></button>
              </template>
            </div>
            <a
              x-show="entry.primary_url"
              :href="entry.primary_url"
              target="_blank"
              rel="noopener"
              class="card-link"
              x-text="entry.links[0]?.rel === 'live' ? 'View live ↗' : 'View ↗'"
            ></a>
          </div>
        </div>
      </article>
    </template>

    <!-- Empty state -->
    <div class="empty-state" x-show="filtered.length === 0 && !loading">
      <p>No entries match your filters.</p>
      <button @click="clearFilters">Clear filters</button>
    </div>
  </main>

  <!-- Lightbox modal -->
  <div
    class="modal-overlay"
    x-show="modal.open"
    x-cloak
    @click.self="closeModal"
    @keydown.escape.window="closeModal"
  >
    <div class="modal-box" role="dialog" :aria-label="modal.entry?.title">
      <button class="modal-close" @click="closeModal" aria-label="Close">✕</button>
      <template x-if="modal.entry">
        <div class="modal-content">
          <div class="modal-image-wrap">
            <img
              :src="modal.entry.images[modal.imageIdx]"
              :alt="modal.entry.title"
              class="modal-image"
            >
            <!-- Image nav when multiple images -->
            <div class="modal-image-nav" x-show="modal.entry.images.length > 1">
              <button @click="modal.imageIdx = Math.max(0, modal.imageIdx - 1)" :disabled="modal.imageIdx === 0">‹</button>
              <span x-text="`${modal.imageIdx + 1} / ${modal.entry.images.length}`"></span>
              <button @click="modal.imageIdx = Math.min(modal.entry.images.length - 1, modal.imageIdx + 1)" :disabled="modal.imageIdx === modal.entry.images.length - 1">›</button>
            </div>
          </div>
          <div class="modal-meta">
            <div class="card-badges">
              <span class="badge" :class="`badge-${modal.entry.kind}`" x-text="modal.entry.kind"></span>
              <span class="badge badge-panel-type" x-show="modal.entry.panel_type" x-text="modal.entry.panel_type"></span>
              <span class="badge badge-source" x-show="modal.entry.source" x-text="modal.entry.source"></span>
            </div>
            <h2 x-text="modal.entry.title"></h2>
            <div class="modal-description" x-html="modal.entry.description_html"></div>
            <div class="card-tags" x-show="modal.entry.tags.length">
              <template x-for="tag in modal.entry.tags" :key="tag">
                <button class="tag" @click="toggleTag(tag); closeModal()" x-text="tag"></button>
              </template>
            </div>
            <div class="modal-links" x-show="modal.entry.links?.length">
              <template x-for="link in modal.entry.links" :key="link.url">
                <a :href="link.url" target="_blank" rel="noopener" class="modal-link">
                  <span class="modal-link-rel" x-text="link.rel"></span>↗
                </a>
              </template>
            </div>
            <div style="margin-top:.5rem">
              <a :href="`catalog/${modal.entry.slug}/`" class="card-link">Full details →</a>
            </div>
          </div>
        </div>
      </template>
    </div>
  </div>

</div>

<script>
  function catalog() {
    return {
      entries: [],
      loading: true,
      search: '',
      filterKind: '',
      filterPanelType: '',
      filterTopic: '',
      filterSource: '',
      filterTags: [],
      modal: { open: false, entry: null, imageIdx: 0 },

      async init() {
        try {
          const res = await fetch("catalog.json");
          this.entries = await res.json();
        } catch (e) {
          console.error('Failed to load catalog.json', e);
        } finally {
          this.loading = false;
        }
      },

      get topics() {
        return [...new Set(this.entries.flatMap(e => e.topics ?? []))].sort();
      },
      get sources() {
        return [...new Set(this.entries.map(e => e.source).filter(Boolean))].sort();
      },
      get panelTypes() {
        return [...new Set(this.entries.map(e => e.panel_type).filter(Boolean))].sort();
      },
      get hasActiveFilters() {
        return this.search || this.filterKind || this.filterPanelType ||
               this.filterTopic || this.filterSource || this.filterTags.length;
      },

      get filtered() {
        return this.entries.filter(e => {
          if (this.filterKind && e.kind !== this.filterKind) return false;
          if (this.filterPanelType && e.panel_type !== this.filterPanelType) return false;
          if (this.filterTopic && !(e.topics ?? []).includes(this.filterTopic)) return false;
          if (this.filterSource && e.source !== this.filterSource) return false;
          if (this.filterTags.length && !this.filterTags.every(t => e.tags.includes(t))) return false;
          if (this.search) {
            const q = this.search.toLowerCase();
            return e.title.toLowerCase().includes(q)
              || e.description.toLowerCase().includes(q)
              || e.tags.some(t => t.toLowerCase().includes(q))
              || (e.source || '').toLowerCase().includes(q);
          }
          return true;
        });
      },

      firstLine(text) {
        return (text || '').split('\n').find(l => l.trim()) || '';
      },
      toggleTag(tag) {
        const i = this.filterTags.indexOf(tag);
        if (i === -1) this.filterTags.push(tag);
        else this.filterTags.splice(i, 1);
      },
      filterByDashboard(slug) {
        this.clearFilters();
        this.search = slug;
      },
      clearFilters() {
        this.search = '';
        this.filterKind = '';
        this.filterPanelType = '';
        this.filterTopic = '';
        this.filterSource = '';
        this.filterTags = [];
      },
      openModal(entry) {
        this.modal = { open: true, entry, imageIdx: 0 };
        document.body.style.overflow = 'hidden';
      },
      closeModal() {
        this.modal.open = false;
        document.body.style.overflow = '';
      },
    };
  }
</script>
{{ end }}
