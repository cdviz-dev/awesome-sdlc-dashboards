[tools]
bun = "latest"
hugo = "0.147.0"

[tasks.install]
description = "Install dependencies"
run = "bun install --frozen-lockfile"

[tasks.build]
description = "Build catalog data + Hugo static site into dist/"
run = [
  "bun run scripts/build.ts",
  "hugo --source hugo --minify",
]
depends = ["install"]

[tasks.dev]
description = "Build catalog data then serve via Hugo dev server at http://localhost:1313"
run = [
  "bun run scripts/build.ts",
  "hugo server --source hugo --bind 0.0.0.0 --port 1313",
]
depends = ["install"]

[tasks.serve]
description = "Serve the already-built dist/ at http://localhost:3000 (no rebuild)"
run = "bun run scripts/serve.ts"

[tasks.validate]
description = "Validate all catalog entries against the JSON schema"
run = "bun run scripts/validate.ts"
depends = ["install"]

[tasks.test]
description = "Run schema unit tests"
run = "bun test scripts/validate.test.ts"
depends = ["install"]
