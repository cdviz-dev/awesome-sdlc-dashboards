description: |
  Self-hosted DORA metrics dashboard from the Middleware open-source project.
  Tracks the four key DORA metrics — Deployment Frequency, Lead Time for Changes,
  Mean Time to Restore (MTTR), and Change Failure Rate — based on Git and pull request history.

  Built as a Next.js web application, it connects to GitHub (and supports Jenkins/Jira) and
  provides trend reports, industry benchmark comparisons, and 90-day historical insights.
